<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manifestação Anônima</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(to right, #1f8a42, #142914);
      padding: 100px 40px;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD */
.box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 100%;
  max-width: 450px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

.title {
  font-weight: 700;
  color: #2e7d32;
  text-align: center;
}

.subtitle {
  font-size: 14px;
  text-align: center;
  color: #777;
  margin-bottom: 20px;
}

/* ALERTA */
.alert-anon {
  background: #fff3cd;
  border-radius: 10px;
  padding: 10px;
  font-size: 13px;
  margin-bottom: 15px;
}

/* BOTÃO */
.btn-main {
  background: #44bc62;
  color: white;
  border-radius: 30px;
  border: none;
  padding: 10px;
  font-weight: 600;
  transition: 0.3s;
}

.btn-main:hover {
  background: #2e7d32;
}

/* PROTOCOLO */
.protocolo-box {
  background: #e8f5e9;
  border-left: 5px solid #44bc62;
  padding: 10px;
  margin-top: 15px;
  display: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="box">

  <h4 class="title"> Manifestação Anônima</h4>
  <p class="subtitle">Envie sua mensagem sem identificação</p>

  <div class="alert-anon">
    ⚠️ Não informe dados pessoais. Esta manifestação é totalmente anônima.
  </div>

  <select id="tipo" class="form-control mb-2">
    <option value="">Selecione o tipo</option>
    <option>Denúncia</option>
    <option>Reclamação</option>
    <option>Sugestão</option>
  </select>

  <input id="assunto" class="form-control mb-2" placeholder="Assunto">

  <textarea id="mensagem" class="form-control mb-2" placeholder="Descreva sua mensagem"></textarea>

  <button class="btn-main w-100" onclick="enviarAnonimo()">Enviar manifestação</button>

  <div id="protocoloBox" class="protocolo-box"></div>

  <button class="btn btn-link w-100 mt-2" onclick="voltar()">← Voltar</button>

</div>

<script>
function enviarAnonimo() {
  const tipo = document.getElementById("tipo").value;
  const assunto = document.getElementById("assunto").value;
  const mensagem = document.getElementById("mensagem").value;

  if(!tipo || !assunto || !mensagem){
    alert("Preencha todos os campos");
    return;
  }

  const protocolo = Date.now();

  const box = document.getElementById("protocoloBox");
  box.style.display = "block";
  box.innerHTML = "✅ Enviado com sucesso!<br><strong>Protocolo:</strong> #" + protocolo;

  limpar();
}

function limpar(){
  document.getElementById("assunto").value = "";
  document.getElementById("mensagem").value = "";
  document.getElementById("tipo").value = "";
}

function voltar(){
  window.location.href = "principal.html";
}
</script>

</body>

</html>
