<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ouvidoria Digital</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #f5f7fa;
    }

    /* HEADER */
    .topbar {
      background: rgba(240, 90, 34, 0.95);
      backdrop-filter: blur(10px);
      padding: 15px 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .logo {
      color: white;
      font-weight: 700;
      font-size: 20px;
    }

    .logo span {
      font-weight: 300;
      display: block;
      font-size: 12px;
      opacity: 0.8;
    }

    .nav-link {
      color: white !important;
      margin-right: 20px;
      font-weight: 500;
      transition: 0.3s;
    }

    .nav-link:hover {
      opacity: 0.7;
    }

    .btn-login {
      background: #0f8b8d;
      color: white;
      border-radius: 30px;
      padding: 8px 20px;
      border: none;
      transition: 0.3s;
    }

    .btn-login:hover {
      background: #0c6f70;
      transform: scale(1.05);
    }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #44bc62, #2e7d32);
      padding: 100px 40px;
      color: white;
    }

    .hero h1 {
      font-size: 60px;
      font-weight: 700;
    }

    .hero h2 {
      font-size: 26px;
      margin-bottom: 20px;
      font-weight: 300;
    }

    .hero p {
      max-width: 500px;
      font-size: 18px;
      opacity: 0.9;
    }

    .btn-main {
      background: white;
      color: #2e7d32;
      padding: 12px 25px;
      border-radius: 30px;
      border: none;
      margin-right: 10px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-main:hover {
      background: #e0e0e0;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #ff9800;
      color: white;
      padding: 12px 25px;
      border-radius: 30px;
      border: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-secondary:hover {
      background: #e68900;
      transform: translateY(-2px);
    }

    /* IMAGEM */
    .image-box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      display: inline-block;
      transition: 0.3s;
    }

    .image-box:hover {
      transform: translateY(-5px);
    }

    .illustration {
      max-width: 250px;
    }

    /* RESPONSIVO */
    @media(max-width: 768px){
      .hero {
        text-align: center;
      }

      .hero h1 {
        font-size: 38px;
      }

      .image-box {
        margin-top: 30px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="topbar d-flex justify-content-between align-items-center">
    
    <div class="logo">
      🏫 DOM WALFRIDO
      <span>OUVIDORIA ESCOLAR</span>
    </div>

    <div class="d-flex align-items-center">
      <a href="#" class="nav-link">Início</a>
      <a href="#" class="nav-link">Institucional</a>
      <a href="#" class="nav-link">Canais</a>
      <button class="btn-login" onclick="login()">Login</button>
    </div>

  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="container">
      <div class="row align-items-center">

        <!-- TEXTO -->
        <div class="col-md-6">
          <h1>Ouvidoria Digital</h1>
          <h2>Seu espaço para voz ativa</h2>

          <p>
            Canal oficial da Escola Dom Walfrido para sugestões, reclamações,
            elogios e denúncias. Sua participação fortalece nossa comunidade.
          </p>

          <div class="mt-4">
            <button class="btn-main" onclick="login()">
              🔐 Fazer Login
            </button>

            <button class="btn-secondary" onclick="anonimo()">
              🕵️ Anônimo
            </button>
          </div>
        </div>

        <!-- IMAGEM -->
        <div class="col-md-6 text-center">
          <div class="image-box">
            <img src="https://cdn-icons-png.flaticon.com/512/3062/3062634.png"
                 class="illustration">
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    function login() {
      window.location.href = "login.html"; // ajuste se necessário
    }
    
    function anonimo() {
      alert("Ir para manifestação anônima");
    }
  </script>

</body>
</html>
