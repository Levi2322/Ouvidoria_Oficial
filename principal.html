<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouvidoria - Dom Walfrido</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Ícones Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #ffffff, #e8f5e9);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }

        .title {
            color: #2e7d32;
            font-weight: bold;
        }

        .btn-custom {
            background-color: #2e7d32;
            color: white;
        }

        .btn-custom:hover {
            background-color: #1b5e20;
        }

        .btn-register {
            background-color: #ff9800;
            color: white;
        }

        .btn-register:hover {
            background-color: #e68900;
        }

        .form-control:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 0 0.2rem rgba(46,125,50,.25);
        }

        .icon {
            color: #2e7d32;
        }

        .link {
            color: #ff9800;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }

        .error-message {
            color: red;
            font-size: 0.9rem;
            display: none;
        }

        @media (max-width: 576px) {
            .login-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-container text-center">

    <!-- Logo / Título -->
    <h3 class="title mb-3">
        <i class="bi bi-chat-dots icon"></i> Ouvidoria Dom Walfrido
    </h3>

    <p class="text-muted">Acesse o sistema</p>

    <!-- Formulário -->
    <form id="loginForm">

        <!-- CPF ou Email -->
        <div class="mb-3 text-start">
            <label class="form-label">CPF ou Email</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person icon"></i></span>
                <input type="text" class="form-control" id="usuario" placeholder="Digite seu CPF ou Email" required>
            </div>
        </div>

        <!-- Senha -->
        <div class="mb-3 text-start">
            <label class="form-label">Senha</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock icon"></i></span>
                <input type="password" class="form-control" id="senha" placeholder="Digite sua senha" required>
            </div>
        </div>

        <!-- Mensagem de erro -->
        <div id="erro" class="error-message mb-2">
            CPF/Email ou senha incorretos.
        </div>

        <!-- Botão Entrar -->
        <button type="submit" class="btn btn-custom w-100 mb-2">
            Entrar
        </button>

        <!-- Links -->
        <div class="d-flex justify-content-between mb-3">
            <a href="#" class="link">Esqueci minha senha</a>
        </div>

        <!-- Botão Cadastrar -->
        <button type="button" class="btn btn-register w-100">
            Cadastrar-se
        </button>

    </form>

</div>

<script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();

        let usuario = document.getElementById("usuario").value;
        let senha = document.getElementById("senha").value;
        let erro = document.getElementById("erro");

        // Simulação de login
        if(usuario === "admin@domwalfrido.com" && senha === "123456") {
            alert("Login realizado com sucesso!");
            erro.style.display = "none";
        } else {
            erro.style.display = "block";
        }
    });
</script>

</body>
</html>
