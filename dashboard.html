<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel - Ouvidoria</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #f1f5f9;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  background: linear-gradient(180deg, #2e7d32, #44bc62);
  color: white;
  position: fixed;
  padding: 20px;
}

.sidebar h4 {
  font-weight: 700;
}

.sidebar button {
  width: 100%;
  margin-top: 10px;
  border: none;
  padding: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  color: white;
  transition: 0.3s;
}

.sidebar button:hover {
  background: rgba(255,255,255,0.2);
}

/* CONTEÚDO */
.content {
  margin-left: 240px;
  padding: 30px;
}

/* CARDS */
.card-box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  margin-bottom: 20px;
  transition: 0.3s;
}

.card-box:hover {
  transform: translateY(-3px);
}

/* STATUS CARDS */
.status-card {
  color: white;
  padding: 20px;
  border-radius: 15px;
}

.bg-green { background: #44bc62; }
.bg-orange { background: #ff9800; }
.bg-blue { background: #0f8b8d; }

/* BOTÃO */
.btn-main {
  background: #44bc62;
  color: white;
  border-radius: 30px;
  border: none;
}

.btn-main:hover {
  background: #2e7d32;
}

/* LISTA */
.item {
  padding: 10px;
  border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>🏫 Ouvidoria</h4>
  <p style="font-size:12px;">Dom Walfrido</p>

  <button onclick="nova()">➕ Nova Manifestação</button>
  <button onclick="carregar()">📋 Minhas Solicitações</button>
  <button onclick="logout()">🚪 Sair</button>
</div>

<!-- CONTEÚDO -->
<div class="content">

  <!-- STATUS -->
  <div class="row mb-3">
    <div class="col-md-4">
      <div class="status-card bg-green">
        <h5>Resolvidas</h5>
        <h2 id="resolvidas">0</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="status-card bg-orange">
        <h5>Em análise</h5>
        <h2 id="analise">0</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="status-card bg-blue">
        <h5>Total</h5>
        <h2 id="total">0</h2>
      </div>
    </div>
  </div>

  <!-- FORM -->
  <div class="card-box">
    <h4>Nova Manifestação</h4>

    <input id="assunto" class="form-control mb-2" placeholder="Assunto">

    <select id="tipo" class="form-control mb-2">
      <option>Tipo</option>
      <option>Reclamação</option>
      <option>Sugestão</option>
      <option>Elogio</option>
      <option>Denúncia</option>
    </select>

    <textarea id="mensagem" class="form-control mb-2" placeholder="Descreva"></textarea>

    <button class="btn-main w-100 p-2" onclick="enviar()">Enviar</button>
  </div>

  <!-- LISTA -->
  <div class="card-box">
    <h4>Minhas Solicitações</h4>
    <div id="lista"></div>
  </div>

</div>

<script>
let dados = [];

function enviar() {
  const assunto = document.getElementById("assunto").value;
  const tipo = document.getElementById("tipo").value;
  const mensagem = document.getElementById("mensagem").value;

  if(!assunto || !mensagem){
    alert("Preencha tudo");
    return;
  }

  const protocolo = Date.now();

  const obj = {
    protocolo,
    assunto,
    tipo,
    status: "Em análise"
  };

  dados.push(obj);

  atualizar();
  limpar();

  alert("Enviado! Protocolo: " + protocolo);
}

function atualizar() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  let resolvidas = 0;

  dados.forEach(item => {
    if(item.status === "Resolvido") resolvidas++;

    lista.innerHTML += `
      <div class="item">
        <strong>#${item.protocolo}</strong><br>
        ${item.assunto} (${item.tipo})<br>
        <small>Status: ${item.status}</small>
      </div>
    `;
  });

  document.getElementById("total").innerText = dados.length;
  document.getElementById("analise").innerText = dados.length - resolvidas;
  document.getElementById("resolvidas").innerText = resolvidas;
}

function limpar(){
  document.getElementById("assunto").value = "";
  document.getElementById("mensagem").value = "";
}

function nova(){
  window.scrollTo(0,0);
}

function carregar(){
  window.scrollTo(0,500);
}

function logout(){
  window.location.href = "principal.html";
}
</script>

</body>
</html>
