<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ouvidoria Digital</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #44bc62, #2e7d32);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
      position: relative;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 700;
      font-size: 22px;
      color: #f05a22;
    }

    .logo span {
      display: block;
      font-size: 12px;
      font-weight: 300;
      color: #777;
    }

    .title {
      text-align: center;
      font-weight: 700;
      margin-bottom: 20px;
      color: #2e7d32;
    }

    .form-control {
      border-radius: 30px;
      padding: 10px 15px;
    }

    .btn-main {
      background: #44bc62;
      color: white;
      border-radius: 30px;
      padding: 10px;
      width: 100%;
      border: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-main:hover {
      background: #2e7d32;
    }

    .btn-back {
      position: absolute;
      top: 15px;
      left: 15px;
      background: #f05a22;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 5px 15px;
      font-size: 14px;
      transition: 0.3s;
    }

    .btn-back:hover {
      background: #d94d1d;
    }

    .switch {
      text-align: center;
      margin-top: 15px;
      cursor: pointer;
      color: #0f8b8d;
      font-weight: 500;
    }

    .switch:hover {
      text-decoration: underline;
    }

    .forgot {
      text-align: right;
      font-size: 13px;
      margin-bottom: 15px;
      cursor: pointer;
      color: #ff9800;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .hidden {
      display: none;
    }

  </style>
</head>

<body>

  <div class="card-box">

    <!-- BOTÃO VOLTAR -->
    <button class="btn-back" onclick="voltar()">
      ← Início
    </button>

    <div class="logo">
      🏫 DOM WALFRIDO
      <span>OUVIDORIA ESCOLAR</span>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <h3 class="title">Entrar</h3>

      <input type="email" class="form-control mb-3" placeholder="E-mail">
      <input type="password" class="form-control mb-2" placeholder="Senha">

      <div class="forgot" onclick="esqueciSenha()">
        Esqueci minha senha
      </div>

      <button class="btn-main" onclick="entrar()">Login</button>

      <div class="switch" onclick="mostrarCadastro()">
        Não tem conta? Cadastre-se
      </div>
    </div>

    <!-- CADASTRO -->
    <div id="cadastroForm" class="hidden">
      <h3 class="title">Cadastro</h3>

      <input type="text" class="form-control mb-3" placeholder="Nome completo">
      <input type="email" class="form-control mb-3" placeholder="E-mail">
      <input type="password" class="form-control mb-3" placeholder="Senha">

      <button class="btn-main">Cadastrar</button>

      <div class="switch" onclick="mostrarLogin()">
        Já tem conta? Fazer login
      </div>
    </div>

  </div>

  <script>
    function mostrarCadastro() {
      document.getElementById("loginForm").classList.add("hidden");
      document.getElementById("cadastroForm").classList.remove("hidden");
    }

    function mostrarLogin() {
      document.getElementById("cadastroForm").classList.add("hidden");
      document.getElementById("loginForm").classList.remove("hidden");
    }


    function entrar() {
  window.location.href = "dashboard.html";
}

    function voltar() {
      window.location.href = "principal.html"; // ajuste se necessário
    }

    function esqueciSenha() {
      alert("Redirecionar para recuperação de senha");
    }
  </script>

</body>
</html>
